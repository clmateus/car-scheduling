{% load authenticate_user %}
{% load static %}
<div id="wrapper" class="animate mobile-menu">
    <nav class="navbar header-top fixed-top navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="{% url 'index' %}">
                <img src="{% static 'img/Lanmax2.png' %}" width="30" height="24">
                <span class="tracking-wide">Ativos & Veículos</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a href="{% url 'menu_veiculos' %}" class="nav-link text-white">Veículos</a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'ativos' %}" class="nav-link text-white">Ativos</a>
                    </li>
                </ul>
            
            <div class="d-flex align-items-center gap-3">
                <div class="text-white-50 d-none d-md-block" style="font-size: 0.9rem;">
                    <i class="bi bi-person-circle me-1"></i> Olá, {{ user.first_name|default:user.username }}
                </div>
                <form id="logout-form" action="{% url 'logout' %}" method="post" class="d-inline m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm d-flex align-items-center gap-2" style="border-radius: 8px;">
                        <i class="fas fa-sign-out-alt"></i>
                        <span class="d-none d-sm-inline">Sair</span>
                    </button>
                </form>
            </div>
        </div>
        </div>
    </nav>
</div>
<script defer src="https://use.fontawesome.com/releases/v5.0.6/js/all.js"></script>
