{% extends "_base.html" %}
{% load authenticate_user %}
{% block content %}

  <div class="breadcrumbs text-sm mb-6">
    <ul>
      <li><a href="{% url 'index' %}">Início</a></li>
      <li>Veículos</li>
      <li>Agendar Viagem</li>
    </ul>
  </div>

  <div class="w-full">
    <div class="flex justify-between items-center mt-4 mb-6">
      <h2 class="text-2xl font-bold">Agendar Viagem</h2>
      <button type="button" class="btn btn-primary text-white" onclick="document.getElementById('modal_insercao').showModal()">
        <i class="bi bi-plus-circle"></i> Nova Viagem
      </button>
    </div>

    <div id="calendar"></div>
  </div>
  
  <!-- Modal do Evento -->
  <dialog id="modal_evento" class="modal">
    <div class="modal-box">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
      </form>
      <h3 class="font-bold text-xl mb-4" id="tituloEvento"></h3>
      <div class="py-2 space-y-3">
        <div class="flex items-center gap-3">
          <i class="bi bi-car-front text-primary text-xl"></i>
          <span id="carroAtribuido" class="text-base-content/80 font-medium"></span>
        </div>
        <div class="flex items-center gap-3">
          <i class="bi bi-play-circle text-success text-xl"></i>
          <span id="inicioEvento" class="text-base-content/80"></span>
        </div>
        <div class="flex items-center gap-3">
          <i class="bi bi-stop-circle text-error text-xl"></i>
          <span id="fimEvento" class="text-base-content/80"></span>
        </div>
      </div>
      <div class="modal-action mt-6">
        <button type="button" class="btn btn-primary text-white" style="display: none;"
                id="btnEditarEvento"
                onclick="document.getElementById('modal_evento').close(); document.getElementById('modal_edicao').showModal();"
                hx-get=""
                hx-target="#modalEdicaoBody"
                hx-swap="innerHTML">
            <i class="bi bi-pencil-square"></i> Editar
        </button>
        <form id="formRemoverAgendamento" hx-post="" hx-swap="none" class="m-0 inline-block">
          {% csrf_token %}
          <button type="submit" class="btn btn-error text-white" id="btnRemoverEvento" style="display: none;" onclick="document.getElementById('modal_evento').close()">
            <i class="bi bi-trash"></i> Excluir
          </button>
        </form>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <!-- Modal de Inserção -->
  <dialog id="modal_insercao" class="modal">
    <div class="modal-box w-11/12 max-w-lg">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
      </form>
      <h3 class="font-bold text-xl mb-6">Criar nova viagem</h3>
      <form hx-post="{% url 'agendar' %}" hx-target="#resultadoModal" hx-swap="innerHTML" class="space-y-4">
        {% csrf_token %}
        <div class="form-control w-full">
          <label for="motorista" class="label"><span class="label-text font-medium">Nome do motorista</span></label>
          <input type="text" class="input input-bordered w-full" name="motorista" id="motorista" required>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-control w-full">
            <label for="dataHoraPartida" class="label"><span class="label-text font-medium">Partida</span></label>
            <input type="datetime-local" class="input input-bordered w-full" name="dataHoraPartida" id="dataHoraPartida" required>
          </div>
          <div class="form-control w-full">
            <label for="dataHoraChegada" class="label"><span class="label-text font-medium">Volta</span></label>
            <input type="datetime-local" class="input input-bordered w-full" name="dataHoraChegada" id="dataHoraChegada" required>
          </div>
        </div>
        <div class="form-control w-full">
          <label for="destino" class="label"><span class="label-text font-medium">Destino</span></label>
          <input type="text" class="input input-bordered w-full" name="destino" id="destino" required>
        </div>
        <div class="form-control w-full">
          <label for="passageiros" class="label"><span class="label-text font-medium">Qtd. Passageiros</span></label>
          <input type="number" class="input input-bordered w-full" name="passageiros" id="passageiros" min="1" max="5" value="1" required>
        </div>
        <div id="resultadoModal" class="mt-2"></div>
        <div class="modal-action mt-6">
          <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal_insercao').close()">Cancelar</button>
          <button type="submit" class="btn btn-success text-white px-8">Agendar</button>
        </div>
      </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <!-- Modal de Edição (Retornado pelo HTMX) -->
  <dialog id="modal_edicao" class="modal">
    <div class="modal-box w-11/12 max-w-lg">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
      </form>
      <h3 class="font-bold text-xl mb-4">Editar Agendamento</h3>
      <div id="modalEdicaoBody">
        <div class="flex justify-center p-8">
          <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <!-- Toasts / Notificações -->
  <div class="toast toast-end z-[1100]">
    <div id="liveToast" class="alert alert-success hidden shadow-lg text-white">
      <span>✅ Reserva realizada com sucesso!</span>
    </div>
    <div id="liveToastCancelado" class="alert alert-error hidden shadow-lg text-white">
      <span>❌ Sua reserva foi cancelada.</span>
    </div>
  </div>

<script>
    document.body.addEventListener('htmx:configRequest', function(event) {
        event.detail.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    });
</script>
{% endblock content %}
