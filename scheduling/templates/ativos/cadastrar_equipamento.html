{% extends '_base.html' %}
{% block content %}
    <div class="container">
        <div class='d-flex justify-content-between align-items-center mb-4'>
                <h1>Cadastrar Equipamento</h1>
                <a class="btn btn-primary px-1 mt-1" href="{% url 'ativos' %}" title="Ativos">Voltar</a>
        </div>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type='submit' class='btn btn-success'>
                Cadastrar
            </button>
        </form>
    </div>
{% endblock %}
