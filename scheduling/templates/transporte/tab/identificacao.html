{% load static %}

<div class="space-y-6">
    {% if mensagem_sucesso %}
        <div class="alert alert-success shadow-lg rounded-xl mb-4">
            <i class="bi bi-check-circle-fill text-xl"></i>
            <span>{{ mensagem_sucesso }}</span>
        </div>
    {% endif %}

    <form 
        hx-post="{% url 'salvar_aba_identificacao' veiculo.id %}"
        hx-target="#tab-body"
        hx-swap="innerHTML"
        hx-encoding="multipart/form-data"
        id="formIdentificacao">
        {% csrf_token %}

        <!-- Título da Seção -->
        <div class="flex items-center gap-3 mb-6 pb-2 border-b border-base-200">
            <div class="w-1 h-8 bg-primary rounded-full"></div>
            <h3 class="text-xl font-bold flex items-center gap-2">
                <i class="bi bi-car-front text-primary"></i>
                Informações do Veículo
            </h3>
        </div>

        <!-- Quilometragem em Destaque -->
        <div class="stats shadow-sm border border-base-200 w-full mb-6 bg-primary/5">
            <div class="stat">
                <div class="stat-figure text-primary">
                    <i class="bi bi-speedometer2 text-4xl"></i>
                </div>
                <div class="stat-title font-semibold text-base-content/70">Quilometragem Atual</div>
                <div class="stat-value text-primary text-3xl">{{ veiculo.quilometragem|default:"0" }} <span class="text-lg text-primary/70">km</span></div>
                <div class="stat-desc font-medium mt-1">Registrada no último uso do veículo</div>
            </div>
        </div>

        <!-- Informações Básicas -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
            <!-- Modelo -->
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-semibold flex items-center gap-2">
                        <i class="bi bi-tag text-primary text-sm"></i>
                        Modelo
                    </span>
                </label>
                <input type="text" class="input input-bordered w-full bg-base-200/50" value="{{ veiculo.modelo }}" disabled>
            </div>
            
            <!-- Marca -->
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-semibold flex items-center gap-2">
                        <i class="bi bi-building text-primary text-sm"></i>
                        Marca
                    </span>
                </label>
                <input type="text" class="input input-bordered w-full bg-base-200/50" value="{{ veiculo.marca }}" disabled>
            </div>
        </div>

        <!-- Documentação -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
            <!-- Placa -->
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-semibold flex items-center gap-2">
                        <i class="bi bi-card-text text-primary text-sm"></i>
                        Placa
                    </span>
                </label>
                <input type="text" class="input input-bordered w-full font-mono uppercase bg-base-200/50" value="{{ veiculo.placa }}" disabled>
            </div>
            
            <!-- Ano -->
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-semibold flex items-center gap-2">
                        <i class="bi bi-calendar text-primary text-sm"></i>
                        Ano
                    </span>
                </label>
                <input type="number" class="input input-bordered w-full bg-base-200/50" value="{{ veiculo.ano }}" disabled>
            </div>
        </div>

        <!-- Características -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
            <!-- Cor -->
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-semibold flex items-center gap-2">
                        <i class="bi bi-palette text-primary text-sm"></i>
                        Cor
                    </span>
                </label>
                <div class="flex items-center gap-2">
                    <input type="text" class="input input-bordered w-full bg-base-200/50" value="{{ veiculo.cor }}" disabled>
                    {% if veiculo.cor %}
                  
                    {% endif %}
                </div>
            </div>
            
            <!-- Chassi -->
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-semibold flex items-center gap-2">
                        <i class="bi bi-upc-scan text-primary text-sm"></i>
                        Chassi
                    </span>
                </label>
                <input type="text" class="input input-bordered w-full font-mono text-sm bg-base-200/50" value="{{ veiculo.chassi }}" disabled>
            </div>
        </div>

        <!-- Registro -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
            <!-- Renavam -->
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-semibold flex items-center gap-2">
                        <i class="bi bi-qr-code text-primary text-sm"></i>
                        Renavam
                    </span>
                </label>
                <input type="text" class="input input-bordered w-full font-mono text-sm bg-base-200/50" value="{{ veiculo.renavam }}" disabled>
            </div>
            
            <!-- Versão -->
            <div class="form-control w-full">
                <label class="label">
                    <span class="label-text font-semibold flex items-center gap-2">
                        <i class="bi bi-diagram-3 text-primary text-sm"></i>
                        Versão
                    </span>
                </label>
                <input type="text" class="input input-bordered w-full bg-base-200/50" value="{{ veiculo.versao }}" disabled>
            </div>
        </div>

        <!-- Botões de Ação -->
        <div class="flex justify-end gap-3 pt-4 border-t border-base-200">
            <button type="button" class="btn btn-ghost" onclick="this.closest('dialog').close()">
                <i class="bi bi-x-lg"></i>
                Fechar
            </button>
            {% if pode_editar %}
            <button type="submit" class="btn btn-primary text-white gap-2">
                <i class="bi bi-pencil-square"></i>
                Editar Informações
            </button>
            {% endif %}
        </div>
    </form>
</div>
