<form hx-post="{% url 'editar_agendamento' agendamento_id %}" hx-target="#modalEdicaoBody" hx-swap="innerHTML" class="space-y-4">
  {% csrf_token %}
  {{ form.as_p }}
  <div class="modal-action mt-6">
    <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal_edicao').close()">Cancelar</button>
    <button type="submit" class="btn btn-success text-white">Salvar Alterações</button>
  </div>
</form>
