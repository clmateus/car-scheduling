<form method="post" class="card bg-base-100 shadow-xl p-6 max-w-lg mx-auto">
  {% csrf_token %}

  {% for field in form %}
    <div class="form-control mb-4">
      <label class="label" for="{{ field.id_for_label }}">
        <span class="label-text font-medium">{{ field.label }}</span>
      </label>

      {{ field }}

      {% if field.errors %}
        {% for error in field.errors %}
          <span class="text-error text-sm mt-1">{{ error }}</span>
        {% endfor %}
      {% endif %}
    </div>
  {% endfor %}

  <div class="mt-6">
    <button type="submit" class="btn btn-primary w-full">Salvar</button>
  </div>
</form>
