{% extends "_base.html" %}
{% block content %}
    <div class="container">
        <h1>Solicitar Equipamento
            <button type="button" class="btn btn-outline-primary">
                <a class="nav-link" href="/ativos" title="Ativos">Voltar</a>
            </button>

    </div>
{% endblock %}
