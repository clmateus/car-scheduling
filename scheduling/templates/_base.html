<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
<head>
    {% include 'partials/head.html' %}
    
    {% comment %} <link rel="stylesheet" id="bootswatch-theme" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/darkly/bootstrap.min.css"> {% endcomment %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
</head>

<body class="d-flex flex-column vh-100 overflow-hidden">
    <div class="d-flex flex-nowrap flex-grow-1">
        {% include 'partials/sidebar.html' %}
        {% block content %}
        {% endblock content %}
        {% comment %} <button class="badge border rounded-pill position-absolute bottom-0 end-0 mb-4 me-4 py-3"
                id="theme-toggle"
                onclick="toggleTheme()">🌑 Dark Mode</button> {% endcomment %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@6.1.20/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>

   {% comment %} <script src="{% static 'jS/DarkLight.js' %}"></script> {% endcomment %}
   <link rel="stylesheet" href="{% static 'css/calendar.css' %}">
  
</body>
</html>
