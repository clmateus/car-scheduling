<!DOCTYPE html>
{% load static %}

<html lang="pt-br">
<head>
    {% include 'partials/head.html' %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>

<body class="d-flex flex-column vh-100">
    <div class="d-flex flex-nowrap flex-grow-1">
        
        {% if user.is_authenticated %}
            {% include 'partials/sidebar.html' %}
        {% endif %}
          
        <main class="flex-grow-1 p-4 overflow-auto main-content">
            {% block content %}
            {% endblock content %}
        </main>
    
    <script src="{% static 'JS/calendar.js' %}"></script>
    <script src="{% static 'JS/abasModal.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@6.1.20/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>

   <link rel="stylesheet" href="{% static 'css/style.css' %}">

</body>
</div>
</html>
