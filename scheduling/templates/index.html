{% extends '_base.html' %}
{% load static %}
{% load authenticate_user %}
{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 80vh">
  <h2 class="display-4 mb-4"><b>Olá, como posso te ajudar?</b></h2>
  <div class="row g-4 mb-4 justify-content-center w-100">
    <div class="col-12 col-md-4">
      <a href="{% url 'menu_veiculos' %}" class="text-reset text-decoration-none d-block h-100">
        <div class="card h-100 border-0 shadow-sm rounded-4">
          <div class="card-body p-4 text-center">
            <i class="bi bi-car-front display-4 text-primary mb-3 d-block"></i>
            <h5 class="card-title fw-semibold">Veículos</h5>
          </div>
        </div>
      </a>
    </div>
    <div class="col-12 col-md-4">
      <a href="{% url 'ativos' %}" class="text-reset text-decoration-none d-block h-100">
        <div class="card h-100 border-0 shadow-sm rounded-4">
          <div class="card-body p-4 text-center">
            <i class="bi bi-phone display-4 text-primary mb-3 d-block"></i>
            <h5 class="card-title fw-semibold">Ativos</h5>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
{% endblock %}
