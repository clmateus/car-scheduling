{% load authenticate_user %}
{% load static %}
<div class="modal-body">

    {% if mensagem_sucesso %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{ mensagem_sucesso }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endif %}
    {% if mensagem_erro %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ mensagem_erro }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endif %}

    <div class="row" >
        <div class="form-label">
            <label>Usuário</label>
            <input type="text" class="form-control" value="{{user.first_name}} {{user.last_name}}" disabled>
        </div>
        <label><strong>Observação</strong></label>
        <form method="POST" 
              action="{% url 'enviar_texto' %}" 
              hx-post="{% url 'enviar_texto' %}"
              hx-target="#tab-body"
              hx-swap="innerHTML">
                  {% csrf_token %}
            <input type="hidden" name="veiculo_id" value="{{ veiculo.id }}">
                <textarea name="mensagem" class="form-control"placeholder="Escreva aqui embaixo alguma informação do veículo"></textarea>
            <button type="submit" class="btn btn-primary mt-2">Enviar Observação</button>
        </form>
    </div>
</div>
