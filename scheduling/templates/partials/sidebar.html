<aside class="w-52 h-screen bg-gray-800 flex flex-col">
  <div class="px-4 py-5 border-b border-gray-700">
    <span class="text-white font-bold text-lg">Teste</span>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1">
    <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Principal</p>
    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-sm
      bg-blue-600 text-white text-lg">
      Início
    </a>
  </nav>
  <div class="px-3 py-4 border-t border-gray-700">
    <div class="flex items-center gap-3 px-2">
      <img class="w-8 h-8 rounded-full" src="avatar.jpg" />
      <div>
        {% if user.is_authenticated %}
          <p class="text-sm font-medium text-white">{{ user.first_name }} {{ user.last_name }}</p>
          <p class="text-xs text-gray-400">{{ user.groups.first.name }}</p>
        {% else %}
          <p>login</p>
        {% endif %}
      </div>
    </div>
  </div>
</aside>
