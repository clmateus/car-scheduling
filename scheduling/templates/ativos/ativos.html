{% extends '_base.html' %}
{% block content %}
{% load authenticate_user %}
<div class="container text-center py-3 ">
        <div class="row justify-content-center mb-4">
            <div class="col-12 col-md-8 d-flex justify-content-between align-items-center">
                <h2 class="display-4 mb-0 mt-2">Ativos</h2>
                <a class="btn btn-outline-primary px-4 mt-2" href="{% url 'index' %}" title="Voltar para o Início">
                    <i class="bi bi-arrow-left "></i> Voltar
                </a>
            </div>
        </div>
        <div class="row g-4 mb-4 justify-content-center">
            <div class="col-12 col-md-4">
                <a href="{% url 'solicitar_equipamento' %}" class="text-reset text-decoration-none d-block h-100">
                    <div class="card h-100 border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <i class="bi bi-phone display-4 text-primary mb-3 d-block"></i>
                            <h5 class="card-title fw-semibold">Solicitar Ativo</h5>
                        </div>
                    </div>
                </a>  
            </div>
            <div class="col-12 col-md-4 ">
                <a href="{% url 'meus_itens' %}" class="text-reset text-decoration-none d-block h-100">
                    <div class="card h-100 border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <i class="bi bi-person display-4 text-primary mb-3 d-block"></i>
                            <h5 class="card-title fw-semibold">Meus Ativos</h5>
                        </div>
                    </div>
                </a>
            </div>            
        </div>
        {% if user|has_group:'Gestores' or user|has_group:'RH' %}
        <div class="row g-4 mb-4 justify-content-center">
            <div class="col-12 col-md-4">
                <a href="{% url 'listar_ativos' %}" class="text-reset text-decoration-none d-block h-100">
                    <div class="card h-100 border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <i class="bi bi-card-list display-4 text-primary mb-3 d-block"></i>
                            <h5 class="card-title fw-semibold">Listar Itens</h5>
                        </div>
                    </div>
                </a>  
            </div>
            <div class="col-12 col-md-4">
                <a href="{% url 'ver_solicitacoes' %}" class="text-reset text-decoration-none d-block h-100">
                    <div class="card h-100 border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <i class="bi bi-file-text display-4 text-primary mb-3 d-block"></i>
                            <h5 class="card-title fw-semibold">Ver Solicitações</h5>
                        </div>
                    </div>
                </a>  
            </div>
        </div>
        <div class="row g-4 mb-4 justify-content-center">
            <div class="col-12 col-md-4">
                <a href="{% url 'historico_ativo' %}" class="text-reset text-decoration-none d-block h-100">
                    <div class="card h-100 border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <i class="bi bi-clock-history display-4 text-primary mb-3 d-block"></i>
                            <h5 class="card-title fw-semibold">Histórico</h5>
                        </div>
                    </div>
                </a>  
            </div>
        </div>
        {% endif %}
    </div>
    <script>
        .col-12.col-md-4 {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </script>
{% endblock %}
