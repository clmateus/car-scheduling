<div class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark">
  <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
    <!-- Colocar ícone svg aqui depois -->
    <span class="fs-4">Agenda de Carros</span>
  </a>
  <button class="badge bg-light-subtle border border-light-subtle text-light-emphasis rounded-pill" id="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
  <hr>
  <ul class="nav nav-pills flex-column mb-auto">
    <li class="nav-item">
      <a href="#" class="nav-link active">Início</a>
    </li>
  </ul>
  <hr>
  <div class="flex-grow-5 p-3">
    {% if user.is_authenticated %}
      <a href="" class="d-flex align-items-center text-white text-decoration-none">
        <img class="rounded-circle me-2" src="" />
        <strong>{{ user.first_name }} {{ user.last_name }}</strong>
      </a>
        <p>{{ user.groups.first.name }}</p>
      <form action="{% url 'logout' %}" method="post" style="display:inline;">
          {% csrf_token %}
          <button class="btn btn-danger" type="submit" >Sair</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}" class=""> 
        Entrar
        <svg class="" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12H4m12 0-4 4m4-4-4-4m3-4h2a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-2"/>
        </svg>
      </a>
    {% endif %}
  </div>
</div>
