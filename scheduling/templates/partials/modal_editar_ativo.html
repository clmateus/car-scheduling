<form hx-post="{% url 'editar_ativo' ativo.id %}"
      hx-target="#modalDetalhesAtivoBody"
      hx-swap="innerHTML"
      enctype="multipart/form-data"
      class="card bg-base-100 shadow-xl p-6 max-w-lg mx-auto">
  {% csrf_token %}

  {% for field in form %}
    <div class="form-control mb-4">
      <label class="label" for="{{ field.id_for_label }}">
        <span class="label-text font-medium">{{ field.label }}</span>
      </label>

      {{ field }}

      {% if field.errors %}
        {% for error in field.errors %}
          <span class="text-error text-sm mt-1">{{ error }}</span>
        {% endfor %}
      {% endif %}
    </div>
  {% endfor %}

  <div class="mt-6 flex gap-2">
    <button type="button"
            class="btn btn-ghost w-1/2"
            hx-get="{% url 'detalhes_ativo' ativo.id %}"
            hx-target="#modalDetalhesAtivoBody"
            hx-swap="innerHTML">
      Cancelar
    </button>
    <button type="submit" class="btn btn-primary w-1/2">Salvar</button>
  </div>
</form>
