{% extends '_base.html' %}
{% load static %}
{% block content %}
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, shrink-to-fit=no, user-scalable=no">
<div class="container-fluid">
    <main class="form-signin w-100 m-auto">
    <form method="post" class="login-form mt-5">
        {% csrf_token %}
        <div class="text-center mb-4">
            <img src="{% static 'img/Lanmax2.png' %}" alt="Lanmax" width="200">
        </div>
        <div class="form-floating mb-3">
            <input type="text" id="user" name="username" class="form-control" placeholder="Usuário" value required autofocus>
            <label for="user">Usuário</label>
        </div>
        <div class="form-floating mb-3">
            <input type="password" id="password" name="password" class="form-control" placeholder="Senha" value required autofocus>
            <label for="password">Senha</label>
        </div>
        {% if form.errors %}
            <div style="padding: 15px; 
                        background-color: #c24222;
                        color: #fff;
                        border-radius: 5px;
                        margin-bottom: 15px;">
                Usuário e/ou Senha incorreta!
            </div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100 py-2"><i class="bi bi-box-arrow-right" aria-hidden="true"></i> Entrar</button>
        <footer class="text-muted text-center text-small"><br>
    <p class="mb-1">Copyright © — Lanmax/Cavemac</p>
    <a href="https://glpi.grupolanmax.com.br">Suporte</a>
    </footer>
    
    </form>


<style>
    html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}
</style>
</main>
</div>
{% endblock %}
