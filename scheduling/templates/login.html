{% extends '_base.html' %}
{% load static %}
{% block content_unauthenticated %}
<div class="flex items-center justify-center w-full min-h-full">
    <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-200">
        <div class="card-body">
            <form method="post" class="w-full">
                {% csrf_token %}
                <div class="text-center mb-8">
                    <img src="{% static 'img/Lanmax2.png' %}" alt="Lanmax" class="w-48 mx-auto">
                </div>

                    <div class="border border-gray-300 rounded p-4">
                    <label class="block" for="user">
                        <span class="label-text font-medium">Usuário</span>
                    </label>
                    <input type="text" id="user" name="username" class="outline-none border-none ring-0 focus:ring-0 focus:outline-none w-full max-w-lg"
                           placeholder="Digite seu usuário" required autofocus>
                    </div>

                    <div class="border border-gray-300 rounded p-4">
                    <label class="block" for="password">
                        <span class="label-text font-medium">Senha</span>
                    </label>
                    <input type="password" id="password" name="password"
                        class="outline-none border-none ring-0 focus:ring-0 focus:outline-none w-full max-w-lg"
                        placeholder="Digite sua senha" required>
                    </div>
                    {% csrf_token %}
                {% if form.errors %}
                    <div class="alert alert-error shadow-sm mb-6">
                        <!-- Ícone SVG inline — sem dependência do Bootstrap Icons -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none"
                             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M12 9v3m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                        </svg>
                        <span>Usuário e/ou Senha incorreta!</span>
                    </div>
                {% endif %}

                <button type="submit" class="bg-blue-600 text-white font-semibold py-2 px-4 rounded w-full text-lg mt-4">
                    Entrar
                </button>
            </form>

            <div class="text-center text-sm opacity-70 mt-6 pt-4 border-t border-base-200">
                <p class="mb-1">Copyright © — Lanmax/Cavemac</p>
            <button class="bg-gray-600 text-white rounded w-50">
                <a href="https://glpi.grupolanmax.com.br">Suporte</a>
            </button>
            </div>
        </div>
    </div>
</div>
{% endblock content_unauthenticated %}
